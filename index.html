    <!-- mode bootstrap: read the saved preference (or fall back to the OS
         default) and set data-theme on <html> BEFORE React mounts, so the
         first paint is already in the right mode and we never flash the
         wrong palette. an OS-default value is NOT persisted here — only an
         explicit toggle writes "uxui-theme" (see src/shell/theme.jsx). -->
    <script>
      ;(function () {
        try {
          var saved = localStorage.getItem("uxui-theme")
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia &&
                  window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
          document.documentElement.setAttribute("data-theme", theme)
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light")
        }
      })()
    </script>
